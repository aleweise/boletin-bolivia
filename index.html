<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📰 Boletín Bolivia — Noticias de Bolivia</title>
  <meta name="description" content="Boletín diario de Bolivia: dólar, crisis política, economía y geopolítica.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-flag">🇧🇴</div>
    <h1 class="hero-title">Boletín Bolivia</h1>
    <p class="hero-subtitle">Lo más importante de Bolivia cada mañana: dólar, crisis, economía y geopolítica.</p>
    <span class="hero-date" id="heroDate">Cargando...</span>
  </header>

  <!-- MAIN CONTENT -->
  <main class="container">

    <div class="section-header">
      <h2>📋 Últimos Boletines</h2>
      <div class="line"></div>
    </div>

    <div class="card-grid" id="bulletinGrid">
      <!-- Cards se cargan dinámicamente -->
    </div>

  </main>

  <footer class="footer">
    <p>Boletín Bolivia — Hecho con ❤️ por Ale para Mamá</p>
  </footer>

  <script>
    // Cargar fechas de boletines
    async function loadBulletins() {
      try {
        const res = await fetch('api/dates.json');
        const dates = await res.json();
        const grid = document.getElementById('bulletinGrid');

        // Mostrar fecha de hoy en hero
        const today = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('heroDate').textContent = today.charAt(0).toUpperCase() + today.slice(1);

        // Ordenar descending
        const sorted = [...dates].sort((a, b) => b.date.localeCompare(a.date));

        sorted.forEach(item => {
          const d = new Date(item.date + 'T12:00:00');
          const dateStr = d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
          const card = document.createElement('a');
          card.href = `boletines/${item.date}.html`;
          card.className = 'card';
          card.innerHTML = `
            <span class="card-date">${dateStr}</span>
            <span class="card-title">${item.title || 'Boletín del ' + dateStr}</span>
            <span class="card-preview">${item.preview || 'Ver contenido completo...'}</span>
            <div class="card-tags">
              ${item.tags ? item.tags.map(t => `<span class="tag tag-${t}">${t}</span>`).join('') : ''}
            </div>
          `;
          grid.appendChild(card);
        });
      } catch (e) {
        document.getElementById('bulletinGrid').innerHTML = '<p style="color:var(--text-muted)">No se pudieron cargar los boletines.</p>';
      }
    }
    loadBulletins();
  </script>

</body>
</html>
